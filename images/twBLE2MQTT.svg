<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Background -->
  <rect width="800" height="500" fill="#1e1e1e" rx="10" />
  
  <!-- Title -->
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#ffffff">twBLE2MQTT</text>
  <text x="400" y="75" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#aaaaaa">Bluetooth Low Energy to MQTT &amp; Syslog Gateway</text>

  <!-- Central Hub -->
  <rect x="300" y="200" width="200" height="120" rx="15" fill="#0d6efd" stroke="#ffffff" stroke-width="1" />
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#ffffff">Core Engine</text>
  <text x="400" y="285" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#cfcfcf">Processing &amp; Routing</text>

  <!-- Left Side: Inputs (BLE Sensors) -->
  <g id="sensors">
    <rect x="50" y="120" width="160" height="280" rx="10" fill="#2d2d2d" stroke="#444444" stroke-dasharray="5,5" />
    <text x="130" y="110" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#cccccc">BLE Sources</text>
    
    <!-- SwitchBot -->
    <rect x="70" y="140" width="120" height="40" rx="5" fill="#e63946" />
    <text x="130" y="165" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">SwitchBot</text>
    
    <!-- Inkbird -->
    <rect x="70" y="195" width="120" height="40" rx="5" fill="#2a9d8f" />
    <text x="130" y="220" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">Inkbird</text>
    
    <!-- OMRON -->
    <rect x="70" y="250" width="120" height="40" rx="5" fill="#457b9d" />
    <text x="130" y="275" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">OMRON</text>
    
    <!-- Other BLE -->
    <rect x="70" y="305" width="120" height="40" rx="5" fill="#9b5de5" />
    <text x="130" y="330" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">Other BLE</text>
  </g>

  <!-- Arrows from Sensors to Hub -->
  <path d="M 210 260 L 290 260" stroke="#666666" stroke-width="3" fill="none" marker-end="url(#arrowhead)" />
  <text x="250" y="250" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#888888">BLE Scan</text>

  <!-- Right Side: Outputs -->
  <g id="outputs">
    <text x="670" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#cccccc">Destinations</text>
    
    <!-- MQTT -->
    <rect x="590" y="200" width="160" height="50" rx="10" fill="#3a2e2a" stroke="#d4a373" stroke-width="1" />
    <text x="670" y="225" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">MQTT Broker</text>
    <text x="670" y="242" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#888888">JSON / Protobuf</text>
    
    <!-- Syslog -->
    <rect x="590" y="270" width="160" height="50" rx="10" fill="#1b4332" stroke="#40916c" stroke-width="1" />
    <text x="670" y="295" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">Syslog Server</text>
    <text x="670" y="312" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#888888">Event Logging</text>
  </g>

  <!-- Arrows from Hub to Outputs -->
  <path d="M 500 240 L 580 230" stroke="#666666" stroke-width="3" fill="none" marker-end="url(#arrowhead)" />
  <path d="M 500 280 L 580 295" stroke="#666666" stroke-width="3" fill="none" marker-end="url(#arrowhead)" />

  <!-- Bottom: Configuration & Resources -->
  <g id="config">
    <rect x="300" y="380" width="200" height="80" rx="10" fill="#2d2d2d" stroke="#444444" stroke-width="2" />
    <text x="400" y="405" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ffffff">Configuration</text>
    <text x="400" y="425" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#aaaaaa">• Env Vars &amp; Flags</text>
    <text x="400" y="445" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#aaaaaa">• Vendor CSV Maps</text>
  </g>
  
  <path d="M 400 320 L 400 370" stroke="#666666" stroke-width="3" fill="none" marker-start="url(#arrowhead)" />

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666666" />
    </marker>
  </defs>
</svg>

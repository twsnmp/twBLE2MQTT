name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: |
          VERSION=${{ github.ref_name }}
          COMMIT=$(git rev-parse --short HEAD)
          LDFLAGS="-X main.version=$VERSION -X main.commit=$COMMIT -s -w"
          
          mkdir -p dist
          
          build() {
            local os=$1
            local arch=$2
            local extension=$3
            local arm=$4
            local output="dist/twBLE2MQTT-${os}-${arch}${arm}"
            
            echo "Building for ${os} ${arch}${arm} (version=$VERSION, commit=$COMMIT)..."
            
            # Darwin (MacOS) requires CGO for CoreBluetooth
            local cgo=0
            if [ "$os" = "darwin" ]; then
              cgo=1
            fi

            if [ -n "$arm" ]; then
              GOOS=$os GOARCH=$arch GOARM=$arm CGO_ENABLED=$cgo go build -ldflags "$LDFLAGS" -o "${output}${extension}"
            else
              GOOS=$os GOARCH=$arch CGO_ENABLED=$cgo go build -ldflags "$LDFLAGS" -o "${output}${extension}"
            fi
          }

          build darwin amd64 ""
          build darwin arm64 ""
          build windows amd64 ".exe"
          build windows arm64 ".exe"
          build linux amd64 ""
          build linux arm64 ""
          build linux arm "" "7"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/twBLE2MQTT-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
